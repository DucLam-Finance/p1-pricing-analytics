version: 2

models:
  - name: stg_orders
    description: "Standardized order headers. All timestamps cast to proper types."
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: order_status
        tests:
          - accepted_values:
              arguments: 
                values: ['delivered','shipped','canceled','unavailable','invoiced','processing','created','approved']

  - name: stg_order_items
    description: "Standardized order line items. Price/freight cast to decimal."
    columns:
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: price
        tests: [not_null]

  - name: stg_order_payments
    description: "Standardized payments. Payment type lowercased."
    columns:
      - name: order_id
        tests: [not_null]
      - name: payment_type
        tests:
          - accepted_values:
              arguments: 
                values: ['credit_card','boleto','voucher','debit_card','not_defined']

  - name: stg_order_reviews
    description: "Standardized reviews. Null comment titles/messages cleaned."
    columns:
      - name: review_id
        tests: [not_null]
      - name: review_score
        tests:
          - accepted_values:
              arguments: 
                values: [1, 2, 3, 4, 5]

  - name: stg_customers
    description: "Standardized customers. City InitCap, state UPPER."
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: stg_products
    description: "Standardized products. Category name lowercased."
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: stg_sellers
    description: "Standardized sellers. City InitCap, state UPPER."
    columns:
      - name: seller_id
        tests: [not_null, unique]

  - name: stg_product_categories
    description: "Portuguese to English category name lookup."
    columns:
      - name: product_category_name
        tests: [not_null, unique]
